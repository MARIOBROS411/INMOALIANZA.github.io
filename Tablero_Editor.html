<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor — Arena Comercial</title>
<style>
  :root{
    --void:#080B14; --panel:#111726; --panel-2:#161e30; --line:#232c42;
    --gold:#F4B400; --silver:#C7CDD9; --bronze:#CD7F32; --cyan:#17E9C0; --cyan-dim:rgba(23,233,192,.15);
    --text:#EDEFF5; --muted:#8892A8;
    --font-display:'Arial Narrow','Arial Black',Impact,sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--void); color:var(--text); font-family:var(--font-body); min-height:100vh;}
  body{background:radial-gradient(ellipse 1200px 600px at 50% -10%, rgba(23,233,192,.08), transparent 60%), var(--void);}

  .topbar{
    position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
    padding:14px 28px; background:rgba(8,11,20,.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .mark{
    width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg, var(--gold), var(--cyan));
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-weight:900; color:#0a0d16; font-size:18px;
  }
  .brand .name{font-family:var(--font-display); letter-spacing:.5px; font-size:20px; font-weight:800; text-transform:uppercase;}
  .brand .sub{font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;}
  .save-pill{
    display:flex; align-items:center; gap:6px; background:var(--cyan-dim); border:1px solid rgba(23,233,192,.4);
    padding:6px 12px; border-radius:100px; font-size:12px; color:var(--cyan); font-weight:600; transition:.3s;
  }
  .save-pill.saved{background:rgba(23,233,192,.3);}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--cyan);}

  .stage{max-width:1300px; margin:0 auto; padding:28px;}
  .tabs{display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;}
  .tab{
    background:var(--panel); border:1px solid var(--line); color:var(--muted); padding:9px 18px; border-radius:100px;
    font-size:13px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:.4px; transition:.2s;
  }
  .tab.active{background:var(--cyan); color:#062018; border-color:var(--cyan);}
  .editor-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
  .editor-toolbar h2{font-family:var(--font-display); text-transform:uppercase; font-size:24px; letter-spacing:.5px;}
  .editor-toolbar .note{font-size:12px; color:var(--muted); margin-top:4px;}
  .btn{
    background:var(--cyan); color:#062018; border:none; padding:10px 18px; border-radius:9px;
    font-weight:800; font-size:13px; cursor:pointer; text-transform:uppercase; letter-spacing:.4px;
  }
  .table-wrap{background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow-x:auto;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  thead th{
    text-align:left; padding:12px 14px; color:var(--muted); font-size:11px; text-transform:uppercase;
    letter-spacing:.6px; border-bottom:1px solid var(--line); white-space:nowrap;
  }
  tbody td{padding:6px 14px; border-bottom:1px solid var(--line); white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(23,233,192,.04);}
  tbody tr.rank-1{background:rgba(244,180,0,.06);}
  .cell-rank{font-family:var(--font-display); font-weight:800; color:var(--muted); width:36px;}
  .rank-1 .cell-rank{color:var(--gold);}
  .rank-2 .cell-rank{color:var(--silver);}
  .rank-3 .cell-rank{color:var(--bronze);}
  input.field{
    background:var(--void); border:1px solid var(--line); color:var(--text); padding:7px 9px; border-radius:7px;
    font-size:13px; width:100%; min-width:80px; font-family:var(--font-body);
  }
  input.field:focus{outline:none; border-color:var(--cyan);}
  input.field.num{width:80px; text-align:right;}
  .pct-badge{display:inline-block; padding:3px 9px; border-radius:100px; font-size:11.5px; font-weight:800; background:var(--void); color:var(--cyan);}
  .footer-note{color:var(--muted); font-size:12px; margin-top:16px; text-align:center; line-height:1.6;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark">A</div>
    <div>
      <div class="name">Editor de datos</div>
      <div class="sub" id="mesLabel">Arena Comercial · —</div>
    </div>
  </div>
  <div class="save-pill" id="savePill"><span class="dot"></span><span id="saveLabel">Sincronizado</span></div>
</div>

<div class="stage">
  <div class="tabs" id="editTabs"></div>
  <div class="editor-toolbar">
    <div>
      <h2 id="editTitle"></h2>
      <div class="note">Los cambios se reflejan en la pantalla de TV en unos segundos.</div>
    </div>
    <button class="btn" id="btnAddRow">+ Agregar persona</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead id="editThead"></thead>
      <tbody id="editTbody"></tbody>
    </table>
  </div>
  <div class="footer-note">Este archivo es solo de edición. La pantalla de TV se muestra en el otro archivo (Tablero_TV.html) y se actualiza sola con lo que cambies aquí.</div>
</div>

<script>
/* ============ CONFIG DE CATEGORÍAS (igual que el archivo de TV) ============ */
const CATS = {
  asesores: {
    label:"Asesores", icon:"🎯", metricLabel:"Cierres",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"cierres",label:"Cierres",type:"num"},
      {k:"meta",label:"Meta",type:"num"},
      {k:"supervisor",label:"Supervisor",type:"text"},
    ],
    metric:r=>r.cierres, isPct:false
  },
  consultores: {
    label:"Consultores", icon:"📋", metricLabel:"Contratos",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"contratos",label:"Contratos",type:"num"},
      {k:"meta",label:"Meta",type:"num"},
      {k:"supervisor",label:"Supervisor",type:"text"},
      {k:"sucursal",label:"Sucursal",type:"text"},
    ],
    metric:r=>r.contratos, isPct:false
  },
  supervisores: {
    label:"Supervisores", icon:"🔧", metricLabel:"Puntuación",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"propios",label:"Cierres propios",type:"num"},
      {k:"equipo",label:"Contratos equipo",type:"num"},
      {k:"activas",label:"Personas activas",type:"num"},
      {k:"metaPropios",label:"Meta propios",type:"num"},
      {k:"gerente",label:"Gerente",type:"text"},
    ],
    metric:r=>(r.propios*3)+(r.equipo*1)+(r.activas*2), isPct:false
  },
  gerentes: {
    label:"Gerentes", icon:"🏢", metricLabel:"Cumplimiento",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"facturacion",label:"Facturación $",type:"num"},
      {k:"equipo",label:"Personas equipo",type:"num"},
      {k:"metaProduccion",label:"Meta producción $",type:"num"},
      {k:"contratos",label:"Contratos",type:"num"},
      {k:"region",label:"Región",type:"text"},
    ],
    metric:r=>r.metaProduccion>0? r.facturacion/r.metaProduccion : 0, isPct:true
  },
  subdirectores: {
    label:"Sub Directores", icon:"🏆", metricLabel:"Cumplimiento",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"produccion",label:"Producción mes $",type:"num"},
      {k:"equipo",label:"Personas equipo",type:"num"},
      {k:"metaProduccion",label:"Meta producción $",type:"num"},
      {k:"contratos",label:"Contratos",type:"num"},
      {k:"region",label:"Región",type:"text"},
    ],
    metric:r=>r.metaProduccion>0? r.produccion/r.metaProduccion : 0, isPct:true
  }
};
const CAT_ORDER = ["asesores","consultores","supervisores","gerentes","subdirectores"];

function seedData(){
  return {
    mes:"2026-06",
    asesores:[
      {nombre:"Liliana Suárez",cierres:3,meta:4,supervisor:"Daysy"},
      {nombre:"Eduardo González",cierres:2,meta:4,supervisor:"Daysy"},
      {nombre:"Ayleen Nazareno",cierres:2,meta:4,supervisor:"Rubia"},
      {nombre:"Joel Paredes",cierres:2,meta:4,supervisor:"Domenica"},
      {nombre:"Rafaella Salazar",cierres:1,meta:4,supervisor:"Rubia"},
      {nombre:"Tito Bravo",cierres:1,meta:4,supervisor:"Daysy"},
      {nombre:"Melissa Grandes",cierres:1,meta:4,supervisor:"Hanameel"},
      {nombre:"Gustavo Calderón",cierres:1,meta:4,supervisor:"Ariana"},
      {nombre:"Sulay Rivera",cierres:1,meta:4,supervisor:"Ariana"},
      {nombre:"Stefania González",cierres:0,meta:4,supervisor:"Domenica"},
      {nombre:"Blasco Vela",cierres:0,meta:4,supervisor:"Rubia"},
      {nombre:"Scarlet Barrientos",cierres:0,meta:4,supervisor:"Rubia"},
      {nombre:"Abigail Coello",cierres:0,meta:4,supervisor:"Rubia"},
      {nombre:"Stefani Mera",cierres:0,meta:4,supervisor:"Domenica"},
      {nombre:"Anthony Solís",cierres:0,meta:4,supervisor:"Domenica"},
      {nombre:"Joyce Lema",cierres:0,meta:4,supervisor:"Daysy"},
      {nombre:"Andrea Páez",cierres:0,meta:4,supervisor:"Daysy"},
      {nombre:"Deiby Sánchez",cierres:0,meta:4,supervisor:"Daysy"},
      {nombre:"Liz Liberio",cierres:0,meta:4,supervisor:"Daysy"},
      {nombre:"José Macías",cierres:0,meta:4,supervisor:"Daysy"},
      {nombre:"Amanda González",cierres:0,meta:4,supervisor:"Ariana"},
      {nombre:"Adriana Noboa",cierres:0,meta:4,supervisor:"Rubia"},
      {nombre:"Samuel Alvarado",cierres:0,meta:4,supervisor:"Rubia"},
      {nombre:"Allan Yépez",cierres:0,meta:4,supervisor:"Ariana"},
    ],
    consultores:[
      {nombre:"Mishell Morales",contratos:2,meta:5,supervisor:"Domenica",sucursal:"Guayaquil"},
      {nombre:"Fernando Salazar",contratos:1,meta:5,supervisor:"Domenica",sucursal:"Guayaquil"},
      {nombre:"Keni Rivera",contratos:1,meta:5,supervisor:"Daisy",sucursal:"Guayaquil"},
      {nombre:"Kary Castro",contratos:1,meta:5,supervisor:"Daisy",sucursal:"Guayaquil"},
      {nombre:"Melissa Grandes",contratos:1,meta:5,supervisor:"Hanameel",sucursal:"Quito"},
      {nombre:"Lisbeth Chávez",contratos:0,meta:5,supervisor:"Hanameel",sucursal:"Quito"},
      {nombre:"Nohelia Mendieta",contratos:0,meta:5,supervisor:"Hanameel",sucursal:"Quito"},
    ],
    supervisores:[
      {nombre:"Daysy",propios:4,equipo:9,activas:10,metaPropios:12,gerente:"Steven"},
      {nombre:"Domenica",propios:3,equipo:3,activas:9,metaPropios:12,gerente:"Steven"},
      {nombre:"Ariana",propios:5,equipo:4,activas:5,metaPropios:12,gerente:"Steven"},
      {nombre:"Rubia",propios:1,equipo:4,activas:7,metaPropios:12,gerente:"Steven"},
      {nombre:"Hanameel",propios:0,equipo:0,activas:10,metaPropios:12,gerente:"Derian"},
      {nombre:"Samir",propios:1,equipo:0,activas:8,metaPropios:12,gerente:"Hugo"},
      {nombre:"Bryan",propios:1,equipo:0,activas:3,metaPropios:12,gerente:"Gabriel"},
      {nombre:"Milena",propios:0,equipo:0,activas:1,metaPropios:12,gerente:"Gabriel"},
    ],
    gerentes:[
      {nombre:"Steveen Cayetano",facturacion:41485,equipo:33,metaProduccion:40000,contratos:16,region:"Guayaquil"},
      {nombre:"Hugo Mora",facturacion:2000,equipo:9,metaProduccion:40000,contratos:1,region:"Quito"},
      {nombre:"Derian Vera",facturacion:1500,equipo:11,metaProduccion:40000,contratos:1,region:"Quito"},
    ],
    subdirectores:[
      {nombre:"Carla Botero",produccion:44985,equipo:55,metaProduccion:90000,contratos:0,region:"Nacional"},
    ],
  };
}

let DATA = null;
let editCat = "asesores";
const STORAGE_KEY = "gamificacion:data";

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){ DATA = JSON.parse(res.value); return; }
    throw new Error("no data");
  }catch(e){
    DATA = seedData();
    await saveData();
  }
}
async function saveData(){
  const pill = document.getElementById("savePill");
  const label = document.getElementById("saveLabel");
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(DATA), true);
    pill.classList.add("saved"); label.textContent = "Guardado ✓";
    setTimeout(()=>{ pill.classList.remove("saved"); label.textContent="Sincronizado"; }, 1200);
  }catch(e){
    label.textContent = "Error al guardar";
    console.error(e);
  }
}
function fmtPct(x){ return (x*100).toFixed(0)+"%"; }
function sortedRows(catKey){
  const cfg = CATS[catKey];
  return [...DATA[catKey]].filter(r=>r.nombre && r.nombre.trim()!=="")
    .sort((a,b)=> cfg.metric(b) - cfg.metric(a));
}

function renderEditTabs(){
  const wrap = document.getElementById("editTabs");
  wrap.innerHTML = CAT_ORDER.map(key=>{
    const cfg = CATS[key];
    return `<button class="tab ${key===editCat?'active':''}" data-cat="${key}">${cfg.icon} ${cfg.label}</button>`;
  }).join("");
  wrap.querySelectorAll(".tab").forEach(btn=>{
    btn.addEventListener("click", ()=>{ editCat = btn.dataset.cat; renderEditor(); });
  });
}
function renderEditor(){
  renderEditTabs();
  const cfg = CATS[editCat];
  document.getElementById("editTitle").textContent = cfg.icon+" "+cfg.label;

  const thead = document.getElementById("editThead");
  thead.innerHTML = "<tr><th>#</th>"+cfg.fields.map(f=>`<th>${f.label}</th>`).join("")+`<th>${cfg.metricLabel}</th></tr>`;

  const rowsSorted = sortedRows(editCat);
  const tbody = document.getElementById("editTbody");
  tbody.innerHTML = rowsSorted.map((r, idx)=>{
    const rankClass = idx===0?"rank-1": idx===1?"rank-2": idx===2?"rank-3":"";
    const origIndex = DATA[editCat].indexOf(r);
    const cells = cfg.fields.map(f=>{
      const v = r[f.k] ?? (f.type==="num"?0:"");
      return `<td><input class="field ${f.type==='num'?'num':''}" type="${f.type==='num'?'number':'text'}"
        value="${String(v).replace(/"/g,'&quot;')}" data-idx="${origIndex}" data-field="${f.k}"></td>`;
    }).join("");
    const metricVal = cfg.isPct ? fmtPct(cfg.metric(r)) : Math.round(cfg.metric(r))+"";
    return `<tr class="${rankClass}">
      <td class="cell-rank">${idx+1}</td>
      ${cells}
      <td><span class="pct-badge">${metricVal}</span></td>
    </tr>`;
  }).join("");

  tbody.querySelectorAll("input.field").forEach(inp=>{
    inp.addEventListener("change", async ()=>{
      const idx = Number(inp.dataset.idx);
      const field = inp.dataset.field;
      const isNum = inp.classList.contains("num");
      DATA[editCat][idx][field] = isNum ? (parseFloat(inp.value)||0) : inp.value;
      await saveData();
      renderEditor();
    });
  });
}

document.getElementById("btnAddRow").addEventListener("click", async ()=>{
  const cfg = CATS[editCat];
  const blank = {};
  cfg.fields.forEach(f=> blank[f.k] = f.type==="num" ? 0 : "");
  if(editCat==="supervisores") blank.metaPropios = 12;
  if(editCat==="asesores") blank.meta = 4;
  if(editCat==="consultores") blank.meta = 5;
  DATA[editCat].push(blank);
  await saveData();
  renderEditor();
});

(async function init(){
  await loadData();
  document.getElementById("mesLabel").textContent = "Arena Comercial · mes "+DATA.mes;
  renderEditor();
})();
</script>
</body>
</html>
