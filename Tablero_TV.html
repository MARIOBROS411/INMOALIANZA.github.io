<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Comercial</title>
<style>
  :root{
    --bg:#0A0C10;
    --panel:#0F1216;
    --line:#1E2228;
    --line-soft:#171A1F;
    --gold:#D4A017;
    --silver:#B8BDC7;
    --bronze:#A66A3C;
    --accent:#3DDC97;
    --text:#F2F3F5;
    --muted:#6B7280;
    --muted-2:#454B54;
    --font-display: 'Helvetica Neue', Arial, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:var(--font-body); width:100%; min-height:100vh;}

  /* ---------- TOP BAR (solo marca + en vivo, sin botones) ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 40px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:baseline; gap:14px;}
  .brand .name{font-size:15px; font-weight:700; letter-spacing:3px; text-transform:uppercase;}
  .brand .divider{width:1px; height:14px; background:var(--line);}
  .brand .sub{font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase;}
  .live-pill{display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; font-weight:600;}
  .live-dot{width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent); animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{opacity:1} 50%{opacity:.3}}

  .stage{max-width:1360px; margin:0 auto; padding:36px 40px 60px;}

  /* ---------- progress ---------- */
  .progress-track{height:2px; background:var(--line); margin-bottom:36px;}
  .progress-fill{height:100%; background:var(--accent); width:0%;}

  .tv-header{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:30px; flex-wrap:wrap; gap:8px;}
  .tv-title{font-size:13px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--muted);}
  .tv-title .accent{color:var(--text);}
  .tv-title-main{font-size:32px; font-weight:800; letter-spacing:-.5px; margin-top:4px;}
  .tv-meta{color:var(--muted-2); font-size:11.5px; letter-spacing:.3px;}

  /* ---------- podium (rediseñado: tabla-escalón, sin glow) ---------- */
  .podium{display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:var(--line); border:1px solid var(--line); margin-bottom:2px;}
  .podium-card{background:var(--panel); padding:30px 22px; text-align:center; position:relative;}
  .rank-num{font-family:var(--font-mono); font-size:11px; color:var(--muted-2); letter-spacing:2px; margin-bottom:18px;}
  .podium-card.p1{background:#121510;}
  .podium-card.p1 .rank-num{color:var(--gold);}
  .podium-card.p2 .rank-num{color:var(--silver);}
  .podium-card.p3 .rank-num{color:var(--bronze);}
  .podium-name{font-size:16px; font-weight:700; margin-bottom:6px; letter-spacing:.2px;}
  .p1 .podium-name{font-size:19px;}
  .podium-sub{font-size:10.5px; color:var(--muted); margin-bottom:22px; text-transform:uppercase; letter-spacing:1px;}
  .podium-value{font-family:var(--font-mono); font-weight:700; font-size:34px; color:var(--text); line-height:1;}
  .p1 .podium-value{font-size:46px; color:var(--gold);}
  .podium-value-label{font-size:10px; color:var(--muted-2); text-transform:uppercase; letter-spacing:1.5px; margin-top:6px;}
  .empty-slot{opacity:.25; font-size:12px; padding:26px 0;}

  /* ---------- lista resto ---------- */
  .rest-list{border:1px solid var(--line); border-top:none;}
  .rest-row{
    display:grid; grid-template-columns:48px 1fr auto; gap:16px; align-items:center;
    padding:13px 22px; border-top:1px solid var(--line-soft);
  }
  .rest-row .pos{font-family:var(--font-mono); color:var(--muted-2); font-weight:700; font-size:13px;}
  .rest-row .who{font-weight:600; font-size:13.5px;}
  .rest-row .who .tag{color:var(--muted); font-weight:400; font-size:11px; text-transform:uppercase; margin-left:10px; letter-spacing:.4px;}
  .rest-row .val{font-family:var(--font-mono); font-weight:700; color:var(--text); font-size:14px;}
  .bar-mini{height:2px; background:var(--line); margin-top:8px; overflow:hidden;}
  .bar-mini > div{height:100%; background:var(--muted-2);}

  /* ---------- resumen general ---------- */
  .summary-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:var(--line); border:1px solid var(--line);}
  .summary-card{background:var(--panel); padding:26px 16px; text-align:center;}
  .summary-card .cat{font-size:10px; letter-spacing:1.8px; text-transform:uppercase; color:var(--muted); margin-bottom:16px; font-weight:700;}
  .summary-card .rank-num{margin-bottom:10px;}
  .summary-card .podium-name{font-size:14px;}
  .summary-card .podium-value{font-size:26px;}

  @media (max-width:900px){
    .podium, .summary-grid{grid-template-columns:1fr;}
    .stage{padding:24px 20px 40px;}
    .topbar{padding:18px 20px;}
  }

  /* ---------- EDITOR (oculto, solo vía #editar) ---------- */
  #editView{display:none;}
  .edit-topbar{
    display:flex; align-items:center; justify-content:space-between; padding:18px 40px; border-bottom:1px solid var(--line);
  }
  .edit-topbar .back{font-size:12px; color:var(--muted); text-decoration:none; letter-spacing:.5px;}
  .tabs{display:flex; gap:6px; margin-bottom:22px; flex-wrap:wrap;}
  .tab{
    background:transparent; border:1px solid var(--line); color:var(--muted); padding:8px 16px;
    font-size:12px; font-weight:600; cursor:pointer; text-transform:uppercase; letter-spacing:.5px; transition:.15s;
  }
  .tab.active{background:var(--text); color:var(--bg); border-color:var(--text);}
  .editor-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .editor-toolbar h2{font-size:20px; font-weight:800; letter-spacing:-.3px;}
  .btn{
    background:var(--text); color:var(--bg); border:none; padding:10px 18px; font-weight:700; font-size:12px;
    cursor:pointer; text-transform:uppercase; letter-spacing:.5px;
  }
  .btn.secondary{background:transparent; color:var(--muted); border:1px solid var(--line);}
  .table-wrap{border:1px solid var(--line); overflow-x:auto;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{text-align:left; padding:10px 14px; color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--line); white-space:nowrap;}
  tbody td{padding:5px 14px; border-bottom:1px solid var(--line-soft); white-space:nowrap;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.rank-1{background:rgba(212,160,23,.06);}
  .cell-rank{font-family:var(--font-mono); font-weight:700; color:var(--muted-2); width:30px;}
  input.field{background:var(--bg); border:1px solid var(--line); color:var(--text); padding:6px 8px; font-size:12.5px; width:100%; min-width:76px; font-family:var(--font-body);}
  input.field:focus{outline:none; border-color:var(--accent);}
  input.field.num{width:76px; text-align:right;}
  .pct-badge{font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--accent);}
  .footer-note{color:var(--muted-2); font-size:11px; margin-top:18px; text-align:center; line-height:1.7;}
</style>
</head>
<body>

<!-- ===== TV / EN VIVO (sin ningún botón de modo) ===== -->
<div id="tvView">
  <div class="topbar">
    <div class="brand">
      <div class="name">Arena Comercial</div>
      <div class="divider"></div>
      <div class="sub" id="mesLabel">—</div>
    </div>
    <div class="live-pill"><span class="live-dot"></span>En vivo</div>
  </div>
  <div class="stage">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div id="tvContent"></div>
  </div>
</div>

<!-- ===== EDITOR (oculto — se activa solo con #editar en la URL) ===== -->
<div id="editView">
  <div class="edit-topbar">
    <div class="brand">
      <div class="name">Editor de datos</div>
      <div class="divider"></div>
      <div class="sub" id="mesLabelEdit">—</div>
    </div>
    <a class="back" href="#" id="btnVolver">← Ver en vivo</a>
  </div>
  <div class="stage">
    <div class="tabs" id="editTabs"></div>
    <div class="editor-toolbar">
      <h2 id="editTitle"></h2>
      <div style="display:flex; gap:10px;">
        <button class="btn secondary" id="btnReset">Restablecer</button>
        <button class="btn" id="btnAddRow">+ Agregar persona</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="editThead"></thead>
        <tbody id="editTbody"></tbody>
      </table>
    </div>
    <div class="footer-note">Los cambios se guardan solos y se ven en la pantalla en vivo en unos segundos.</div>
  </div>
</div>

<script>
/* ============ CONFIG DE CATEGORÍAS ============ */
const CATS = {
  asesores: {
    label:"Asesores", metricLabel:"Cierres",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"cierres",label:"Cierres",type:"num"},
      {k:"meta",label:"Meta",type:"num"},
      {k:"supervisor",label:"Supervisor",type:"text"},
    ],
    metric:r=>r.cierres, pct:r=>r.meta>0? r.cierres/r.meta:0, sub:r=>"Sup. "+(r.supervisor||"—"),
    valueLabel:"cierres", isPct:false
  },
  consultores: {
    label:"Consultores", metricLabel:"Contratos",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"contratos",label:"Contratos",type:"num"},
      {k:"meta",label:"Meta",type:"num"},
      {k:"supervisor",label:"Supervisor",type:"text"},
      {k:"sucursal",label:"Sucursal",type:"text"},
    ],
    metric:r=>r.contratos, pct:r=>r.meta>0? r.contratos/r.meta:0, sub:r=>(r.sucursal||"—"),
    valueLabel:"contratos", isPct:false
  },
  supervisores: {
    label:"Supervisores", metricLabel:"Puntuación",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"propios",label:"Cierres propios",type:"num"},
      {k:"equipo",label:"Contratos equipo",type:"num"},
      {k:"activas",label:"Personas activas",type:"num"},
      {k:"metaPropios",label:"Meta propios",type:"num"},
      {k:"gerente",label:"Gerente",type:"text"},
    ],
    metric:r=>(r.propios*3)+(r.equipo*1)+(r.activas*2), pct:r=>r.metaPropios>0? r.propios/r.metaPropios:0,
    sub:r=>"Ger. "+(r.gerente||"—"), valueLabel:"pts", isPct:false,
    formulaNote:"Puntuación = propios ×3 + equipo ×1 + activas ×2"
  },
  gerentes: {
    label:"Gerentes", metricLabel:"Cumplimiento",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"facturacion",label:"Facturación $",type:"num"},
      {k:"equipo",label:"Personas equipo",type:"num"},
      {k:"metaProduccion",label:"Meta producción $",type:"num"},
      {k:"contratos",label:"Contratos",type:"num"},
      {k:"region",label:"Región",type:"text"},
    ],
    metric:r=>r.metaProduccion>0? r.facturacion/r.metaProduccion:0, pct:r=>r.metaProduccion>0? r.facturacion/r.metaProduccion:0,
    sub:r=>(r.region||"—"), valueLabel:"%", isPct:true
  },
  subdirectores: {
    label:"Sub Directores", metricLabel:"Cumplimiento",
    fields:[
      {k:"nombre",label:"Nombre",type:"text"},
      {k:"produccion",label:"Producción mes $",type:"num"},
      {k:"equipo",label:"Personas equipo",type:"num"},
      {k:"metaProduccion",label:"Meta producción $",type:"num"},
      {k:"contratos",label:"Contratos",type:"num"},
      {k:"region",label:"Región",type:"text"},
    ],
    metric:r=>r.metaProduccion>0? r.produccion/r.metaProduccion:0, pct:r=>r.metaProduccion>0? r.produccion/r.metaProduccion:0,
    sub:r=>(r.region||"—"), valueLabel:"%", isPct:true
  }
};
const CAT_ORDER = ["asesores","consultores","supervisores","gerentes","subdirectores"];

      {nombre:"Amanda González",cierres:0,meta:4,supervisor:"Ariana"},

    subdirectores:[

    ],
  };
}

let DATA = null;
let editCat = "asesores";
let tvIndex = 0;
const TV_SCREENS = ["resumen", ...CAT_ORDER];
let cycleTimer=null, progressTimer=null;
const CYCLE_MS = 11000;
const STORAGE_KEY = "gamificacion:data";

async function loadData(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){ DATA = JSON.parse(res.value); return; }
    throw new Error("no data");
  }catch(e){
    DATA = seedData();
    await saveData();
  }
}
async function saveData(){
  try{ await window.storage.set(STORAGE_KEY, JSON.stringify(DATA), true); }
  catch(e){ console.error("Error guardando", e); }
}
function fmtPct(x){ return (x*100).toFixed(0)+"%"; }
function sortedRows(catKey){
  const cfg = CATS[catKey];
  return [...DATA[catKey]].filter(r=>r.nombre && r.nombre.trim()!=="")
    .sort((a,b)=> cfg.metric(b) - cfg.metric(a));
}

/* ============ RENDER TV ============ */
function renderTV(){
  const screen = TV_SCREENS[tvIndex];
  const el = document.getElementById("tvContent");
  el.innerHTML = screen==="resumen" ? renderResumen() : renderCategoriaTV(screen);
}
function renderResumen(){
  let cards = CAT_ORDER.map(key=>{
    const cfg = CATS[key];
    const rows = sortedRows(key);
    const top = rows[0];
    if(!top) return `<div class="summary-card"><div class="cat">${cfg.label}</div><div class="empty-slot">Sin datos</div></div>`;
    const val = cfg.isPct ? fmtPct(cfg.metric(top)) : Math.round(cfg.metric(top))+"";
    return `<div class="summary-card">
      <div class="cat">${cfg.label}</div>
      <div class="rank-num">N.º 1</div>
      <div class="podium-name">${top.nombre}</div>
      <div class="podium-sub">${cfg.sub(top)}</div>
      <div class="podium-value">${val}</div>
      <div class="podium-value-label">${cfg.metricLabel}</div>
    </div>`;
  }).join("");
  return `<div class="tv-header">
      <div>
        <div class="tv-title">Resumen general</div>
        <div class="tv-title-main">Líder de cada equipo</div>
      </div>
      <div class="tv-meta">Mes ${DATA.mes}</div>
    </div>
    <div class="summary-grid">${cards}</div>`;
}
function renderCategoriaTV(key){
  const cfg = CATS[key];
  const rows = sortedRows(key);
  const podium = [rows[1], rows[0], rows[2]];
  const posClass = ["p2","p1","p3"];
  const posLabel = ["N.º 2","N.º 1","N.º 3"];

  let podiumHtml = podium.map((r,i)=>{
    if(!r) return `<div class="podium-card ${posClass[i]}"><div class="empty-slot">Sin datos aún</div></div>`;
    const val = cfg.isPct ? fmtPct(cfg.metric(r)) : Math.round(cfg.metric(r))+"";
    return `<div class="podium-card ${posClass[i]}">
      <div class="rank-num">${posLabel[i]}</div>
      <div class="podium-name">${r.nombre}</div>
      <div class="podium-sub">${cfg.sub(r)}</div>
      <div class="podium-value">${val}</div>
      <div class="podium-value-label">${cfg.valueLabel}</div>
    </div>`;
  }).join("");

  let restHtml = rows.slice(3,10).map((r,i)=>{
    const pct = Math.min(cfg.pct(r),1);
    const val = cfg.isPct ? fmtPct(cfg.metric(r)) : Math.round(cfg.metric(r))+"";
    return `<div class="rest-row">
      <div class="pos">${String(i+4).padStart(2,"0")}</div>
      <div class="who">${r.nombre}<span class="tag">${cfg.sub(r)}</span>
        <div class="bar-mini"><div style="width:${(pct*100).toFixed(0)}%"></div></div>
      </div>
      <div class="val">${val}</div>
    </div>`;
  }).join("");
  if(!restHtml) restHtml = `<div class="rest-row"><div class="who" style="color:var(--muted)">No hay más registros en esta categoría.</div></div>`;

  return `<div class="tv-header">
      <div>
        <div class="tv-title">${cfg.label}</div>
        <div class="tv-title-main">Ranking del mes</div>
      </div>
      <div class="tv-meta">${cfg.metricLabel} · mes ${DATA.mes}${cfg.formulaNote? " · "+cfg.formulaNote : ""}</div>
    </div>
    <div class="podium">${podiumHtml}</div>
    <div class="rest-list">${restHtml}</div>`;
}

function startCycle(){
  clearInterval(cycleTimer); clearInterval(progressTimer);
  let elapsed = 0;
  const fill = document.getElementById("progressFill");
  progressTimer = setInterval(()=>{
    elapsed += 100;
    fill.style.width = Math.min(100, (elapsed/CYCLE_MS)*100)+"%";
  },100);
  cycleTimer = setInterval(()=>{
    tvIndex = (tvIndex+1) % TV_SCREENS.length;
    elapsed = 0;
    renderTV();
  }, CYCLE_MS);
}

/* ============ RENDER EDITOR ============ */
function renderEditTabs(){
  const wrap = document.getElementById("editTabs");
  wrap.innerHTML = CAT_ORDER.map(key=>{
    const cfg = CATS[key];
    return `<button class="tab ${key===editCat?'active':''}" data-cat="${key}">${cfg.label}</button>`;
  }).join("");
  wrap.querySelectorAll(".tab").forEach(btn=>{
    btn.addEventListener("click", ()=>{ editCat = btn.dataset.cat; renderEditor(); });
  });
}
function renderEditor(){
  renderEditTabs();
  const cfg = CATS[editCat];
  document.getElementById("editTitle").textContent = cfg.label;

  const thead = document.getElementById("editThead");
  thead.innerHTML = "<tr><th>#</th>"+cfg.fields.map(f=>`<th>${f.label}</th>`).join("")+`<th>${cfg.metricLabel}</th></tr>`;

  const rowsSorted = sortedRows(editCat);
  const tbody = document.getElementById("editTbody");
  tbody.innerHTML = rowsSorted.map((r, idx)=>{
    const rankClass = idx===0?"rank-1":"";
    const origIndex = DATA[editCat].indexOf(r);
    const cells = cfg.fields.map(f=>{
      const v = r[f.k] ?? (f.type==="num"?0:"");
      return `<td><input class="field ${f.type==='num'?'num':''}" type="${f.type==='num'?'number':'text'}"
        value="${String(v).replace(/"/g,'&quot;')}" data-idx="${origIndex}" data-field="${f.k}"></td>`;
    }).join("");
    const metricVal = cfg.isPct ? fmtPct(cfg.metric(r)) : Math.round(cfg.metric(r))+"";
    return `<tr class="${rankClass}">
      <td class="cell-rank">${idx+1}</td>
      ${cells}
      <td><span class="pct-badge">${metricVal}</span></td>
    </tr>`;
  }).join("");

  tbody.querySelectorAll("input.field").forEach(inp=>{
    inp.addEventListener("change", async ()=>{
      const idx = Number(inp.dataset.idx);
      const field = inp.dataset.field;
      const isNum = inp.classList.contains("num");
      DATA[editCat][idx][field] = isNum ? (parseFloat(inp.value)||0) : inp.value;
      await saveData();
      renderEditor();
    });
  });
}

document.getElementById("btnAddRow").addEventListener("click", async ()=>{
  const cfg = CATS[editCat];
  const blank = {};
  cfg.fields.forEach(f=> blank[f.k] = f.type==="num" ? 0 : "");
  if(editCat==="supervisores") blank.metaPropios = 12;
  if(editCat==="asesores") blank.meta = 4;
  if(editCat==="consultores") blank.meta = 5;
  DATA[editCat].push(blank);
  await saveData();
  renderEditor();
});
document.getElementById("btnReset").addEventListener("click", async ()=>{
  if(confirm("¿Restablecer todos los datos a los valores originales? Esto no se puede deshacer.")){
    DATA = seedData();
    await saveData();
    renderEditor();
    renderTV();
  }
});
document.getElementById("btnVolver").addEventListener("click", (e)=>{
  e.preventDefault();
  location.hash = "";
  showTV();
});

/* ============ NAVEGACIÓN POR HASH (#editar oculto) ============ */
function showTV(){
  document.getElementById("tvView").style.display = "block";
  document.getElementById("editView").style.display = "none";
  tvIndex = 0; renderTV(); startCycle();
}
function showEditor(){
  clearInterval(cycleTimer); clearInterval(progressTimer);
  document.getElementById("tvView").style.display = "none";
  document.getElementById("editView").style.display = "block";
  renderEditor();
}
function routeFromHash(){
  if(location.hash === "#editar"){ showEditor(); } else { showTV(); }
}
window.addEventListener("hashchange", routeFromHash);

/* ============ POLLING (tiempo real) ============ */
let lastSnapshot = "";
async function poll(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value && res.value !== lastSnapshot){
      const isTyping = document.activeElement && document.activeElement.classList.contains("field");
      lastSnapshot = res.value;
      if(!isTyping){
        DATA = JSON.parse(res.value);
        if(location.hash === "#editar") renderEditor(); else renderTV();
        document.getElementById("mesLabel").textContent = "Mes "+DATA.mes;
        document.getElementById("mesLabelEdit").textContent = "Mes "+DATA.mes;
      }
    }
  }catch(e){}
}
setInterval(poll, 4000);

/* ============ INIT ============ */
(async function init(){
  await loadData();
  lastSnapshot = JSON.stringify(DATA);
  document.getElementById("mesLabel").textContent = "Mes "+DATA.mes;
  document.getElementById("mesLabelEdit").textContent = "Mes "+DATA.mes;
  routeFromHash();
})();
</script>
</body>
</html>
