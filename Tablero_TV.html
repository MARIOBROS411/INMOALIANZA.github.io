<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Comercial</title>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#070A10;
    --panel:#0E131C;
    --line:#1D2836;
    --gold:#F2B705;
    --gold-glow:rgba(242,183,5,.35);
    --silver:#C3C9D4;
    --bronze:#C97D3F;
    --accent:#4A9FE0;
    --accent-2:#6FE0B8;
    --danger:#E5484D;
    --text:#F5F6F8;
    --muted:#7C8AA0;
    --muted-2:#48566B;
    --font-display:'Arial Black',Impact,'Arial Narrow',sans-serif;
    --font-body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --font-mono:'SF Mono','Consolas','Courier New',monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:var(--font-body); width:100%; min-height:100vh; overflow-x:hidden;}
  body{
    background:
      radial-gradient(ellipse 1100px 550px at 50% -12%, rgba(74,159,224,.12), transparent 60%),
      radial-gradient(ellipse 900px 500px at 100% 105%, rgba(111,224,184,.06), transparent 60%),
      var(--bg);
  }

  .topbar{
    display:flex; align-items:center; justify-content:space-between; padding:22px 44px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:16px;}
  .brand .logo{height:34px; width:auto; display:block;}
  .brand .divider{width:1px; height:28px; background:var(--line);}
  .brand .name{font-family:var(--font-display); font-size:22px; font-weight:900; letter-spacing:.5px; text-transform:uppercase;}
  .brand .sub{font-size:12px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; font-weight:600;}
  .live-pill{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--accent-2); letter-spacing:1.5px; text-transform:uppercase; font-weight:800;}
  .live-dot{width:8px; height:8px; border-radius:50%; background:var(--accent-2); box-shadow:0 0 10px var(--accent-2); animation:pulse 1.6s infinite;}
  .live-dot.off{background:var(--danger); box-shadow:0 0 10px var(--danger); animation:none;}
  @keyframes pulse{0%,100%{opacity:1} 50%{opacity:.3}}

  .stage{max-width:1400px; margin:0 auto; padding:38px 44px 60px;}
  .progress-track{height:3px; background:var(--line); border-radius:3px; overflow:hidden; margin-bottom:34px;}
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-2)); width:0%;}

  #tvContent.fade-in{animation:contentIn .5s cubic-bezier(.16,1,.3,1);}
  @keyframes contentIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .tv-header{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:10px;}
  .tv-title{font-size:12.5px; font-weight:800; letter-spacing:3.5px; text-transform:uppercase; color:var(--gold);}
  .tv-title-main{font-family:var(--font-display); font-size:36px; font-weight:900; letter-spacing:.3px; text-transform:uppercase; margin-top:6px;}
  .tv-meta{color:var(--muted); font-size:12px; letter-spacing:.3px;}

  .podium{display:grid; grid-template-columns:1fr 1.18fr 1fr; align-items:end; gap:16px; margin-bottom:32px;}
  .podium-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:26px 20px; text-align:center; position:relative; overflow:hidden;
    box-shadow:0 8px 24px -12px rgba(0,0,0,.4);
  }
  .podium-card.p1{
    border-color:var(--gold); padding-top:34px; padding-bottom:34px;
    box-shadow:0 0 50px -8px var(--gold-glow), inset 0 0 0 1px rgba(242,183,5,.18);
    background:linear-gradient(180deg, rgba(242,183,5,.09), var(--panel) 55%);
  }
  .podium-card.p2{border-color:rgba(195,201,212,.35);}
  .podium-card.p3{border-color:rgba(201,125,63,.45);}
  .medal{width:54px; height:54px; border-radius:50%; margin:0 auto 14px; display:flex; align-items:center; justify-content:center; font-size:26px;}
  .p1 .medal{width:68px; height:68px; font-size:34px;}
  .podium-name{font-size:17px; font-weight:800; margin-bottom:5px; letter-spacing:.2px;}
  .p1 .podium-name{font-size:22px;}
  .podium-sub{font-size:11px; color:var(--muted); margin-bottom:18px; text-transform:uppercase; letter-spacing:.8px; font-weight:600;}
  .podium-value{font-family:var(--font-mono); font-weight:800; font-size:36px; color:var(--text); line-height:1;}
  .p1 .podium-value{font-size:50px; color:var(--gold);}
  .podium-value-label{font-size:10.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:1.3px; margin-top:6px; font-weight:700;}
  .empty-slot{opacity:.25; font-size:12px; padding:30px 0;}
  .summary-card.is-empty{opacity:.55;}
  .summary-card.is-empty .cat{color:var(--muted-2);}
  .empty-icon{font-size:26px; color:var(--muted-2); margin:10px 0 12px; font-weight:300;}
  .empty-msg{font-size:12.5px; color:var(--muted); font-weight:600; letter-spacing:.2px;}
  .rest-row.empty-row{padding:26px 22px; justify-content:center;}
  .rest-row.empty-row .who{color:var(--muted); font-weight:600; text-align:center; width:100%;}

  .rest-list{background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .rest-row{display:grid; grid-template-columns:48px 1fr auto; gap:16px; align-items:center; padding:13px 22px; border-bottom:1px solid var(--line);}
  .rest-row:last-child{border-bottom:none;}
  .rest-row .pos{font-family:var(--font-mono); color:var(--muted-2); font-weight:800; font-size:15px;}
  .rest-row .who{font-weight:700; font-size:14px;}
  .rest-row .who .tag{color:var(--muted); font-weight:500; font-size:11.5px; text-transform:uppercase; margin-left:10px; letter-spacing:.4px;}
  .rest-row .val{font-family:var(--font-mono); font-weight:800; color:var(--accent); font-size:15px;}
  .top5-row .pos{font-size:20px;}
  .top5-row.top5-1{background:rgba(242,183,5,.06);}
  .top5-row.top5-1 .who{font-size:15px;}
  .top5-row.top5-1 .val{color:var(--gold); font-size:17px;}
  .top5-row:not(.top5-1):not(.top5-2):not(.top5-3) .pos{font-family:var(--font-mono); font-size:15px; color:var(--muted-2);}
  .dual-val{display:flex; gap:18px; align-items:center;}
  .dual-val > div{text-align:center;}
  .dual-num{display:block; font-family:var(--font-mono); font-weight:800; font-size:16px; color:var(--text);}
  .dual-lbl{display:block; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-top:2px;}
  .dual-num-puntos{color:var(--gold);}
  .bar-mini{height:3px; background:var(--bg); border-radius:3px; margin-top:7px; overflow:hidden;}
  .bar-mini > div{height:100%; background:var(--accent);}

  .summary-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:14px;}
  .summary-card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:24px 16px; text-align:center;}
  .summary-card .cat{font-size:10.5px; letter-spacing:1.8px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; font-weight:800;}
  .summary-card .medal{margin-bottom:10px; width:44px; height:44px; font-size:22px;}
  .summary-card .podium-name{font-size:14.5px;}
  .summary-card .podium-value{font-size:28px; color:var(--gold);}

  .status-msg{text-align:center; padding:80px 0; color:var(--muted); font-size:14px;}
  .status-msg.err{color:#ff9a9d;}

  @media (max-width:900px){
    .podium{grid-template-columns:1fr; grid-template-rows:auto;}
    .podium-card.p1{order:-1;}
    .summary-grid{grid-template-columns:repeat(2,1fr);}
    .stage{padding:26px 20px 40px;}
    .topbar{padding:18px 20px;}
  }
</style>
</head>

<script>

let db, dataRef;
function setLive(ok, label){
  document.getElementById("liveDot").classList.toggle("off", !ok);
  document.getElementById("liveLabel").textContent = label;
}
try{
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  dataRef = db.ref("gamificacion/data");
}catch(e){
  document.getElementById("tvContent").innerHTML = `<div class="status-msg err">No se pudo conectar a Firebase.<br>Detalle: ${e.message}</div>`;
  setLive(false, "Error");
}

/* Mes: usa el ajuste manual guardado en el editor si existe; si no, calcula con la fecha del sistema */
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
function mesActualLabel(){
  if(DATA && DATA.mesManual){
    return "Ranking mensual · " + MESES[DATA.mesManual.mesIdx] + " " + DATA.mesManual.anio;
  }
  const d = new Date();
  return "Ranking mensual · " + MESES[d.getMonth()] + " " + d.getFullYear();
}

/* ============ CONFIG DE CATEGORÍAS ============ */
const CATS = {
  asesores: { label:"Asesores", metricLabel:"Contratos",
    metric:r=>r.cierres, pct:r=>r.meta>0? r.cierres/r.meta:0, sub:r=>"Sup. "+(r.supervisor||"—"), valueLabel:"contratos", isPct:false },
  consultores: { label:"Consultores", metricLabel:"Contratos",
    metric:r=>r.contratos, pct:r=>r.meta>0? r.contratos/r.meta:0, sub:r=>(r.sucursal||"—"), valueLabel:"contratos", isPct:false },
  supervisores: { label:"Supervisores", metricLabel:"",
    metric:r=>(r.puntos||0), pct:r=>r.metaPropios>0? r.propios/r.metaPropios:0,
    sub:r=>"Ger. "+(r.gerente||"—"), isPct:false, dual:true,
    valA:r=>r.propios||0, valALabel:"Propios", valB:r=>r.equipo||0, valBLabel:"Equipo",
    valC:r=>r.puntos||0, valCLabel:"Puntos" },
  gerentes: { label:"Gerentes", metricLabel:"Cumplimiento",
    metric:r=>r.metaProduccion>0? r.facturacion/r.metaProduccion:0, pct:r=>r.metaProduccion>0? r.facturacion/r.metaProduccion:0,
    sub:r=>(r.region||"—"), valueLabel:"%", isPct:true },
  subdirectores: { label:"Sub Directores", metricLabel:"Cumplimiento",
    metric:r=>r.metaProduccion>0? r.produccion/r.metaProduccion:0, pct:r=>r.metaProduccion>0? r.produccion/r.metaProduccion:0,
    sub:r=>(r.region||"—"), valueLabel:"%", isPct:true },
};
const CAT_ORDER_ALL = ["asesores","consultores","supervisores","gerentes","subdirectores"];
function catsVisibles(){
  return CAT_ORDER_ALL.filter(k => (k!=="gerentes" && k!=="subdirectores") || DATA.mostrarNivelesAltos);
}
function normalizarDatos(d){
  CAT_ORDER_ALL.forEach(cat=>{
    if(!Array.isArray(d[cat])){
      d[cat] = d[cat] ? Object.values(d[cat]) : [];
    }
  });
  return d;
}
function tvScreens(){ return ["resumen", ...catsVisibles()]; }
const CYCLE_MS = 11000;

let DATA = null;
let tvIndex = 0;
let cycleTimer=null, progressTimer=null;

function fmtPct(x){ return (x*100).toFixed(0)+"%"; }
function sortedRows(catKey){
  const cfg = CATS[catKey];
  return [...(DATA[catKey]||[])].filter(r=>r.nombre && r.nombre.trim()!=="")
    .sort((a,b)=> cfg.metric(b) - cfg.metric(a));
}

function renderTV(){
  const screens = tvScreens();
  const screen = screens[tvIndex % screens.length];
  const el = document.getElementById("tvContent");
  if(screen==="resumen"){ el.innerHTML = renderResumen(); }
  else if(TOP5_CATS.includes(screen)){ el.innerHTML = renderTop5(screen); }
  else{ el.innerHTML = renderCategoriaTV(screen); }
  el.classList.remove("fade-in");
  void el.offsetWidth; /* fuerza reflow para poder repetir la animación */
  el.classList.add("fade-in");
}
function renderResumen(){
  let cards = catsVisibles().map(key=>{
    const cfg = CATS[key];
    const rows = sortedRows(key);
    const top = rows[0];
    const esZeroCat = TOP5_CATS.includes(key);
    if(!top || (esZeroCat && cfg.metric(top)===0)){
      const msgs = { asesores:"0 ventas aún…", consultores:"Sin contratos aún", supervisores:"Sin puntos aún" };
      return `<div class="summary-card is-empty">
        <div class="cat">${cfg.label}</div>
        <div class="empty-icon">–</div>
        <div class="empty-msg">${msgs[key] || "Sin datos aún"}</div>
      </div>`;
    }
    const valorHtml = cfg.dual
      ? `<div class="dual-val" style="justify-content:center; margin-top:2px;">
           <div><span class="dual-num">${cfg.valA(top)}</span><span class="dual-lbl">${cfg.valALabel}</span></div>
           <div><span class="dual-num">${cfg.valB(top)}</span><span class="dual-lbl">${cfg.valBLabel}</span></div>
           ${cfg.valC ? `<div><span class="dual-num dual-num-puntos">${cfg.valC(top)}</span><span class="dual-lbl">${cfg.valCLabel}</span></div>` : ""}
         </div>`
      : `<div class="podium-value">${cfg.isPct ? fmtPct(cfg.metric(top)) : Math.round(cfg.metric(top))+""}</div>
         <div class="podium-value-label">${cfg.metricLabel}</div>`;
    return `<div class="summary-card">
      <div class="cat">${cfg.label}</div>
      <div class="medal">🥇</div>
      <div class="podium-name">${top.nombre}</div>
      <div class="podium-sub">${cfg.sub(top)}</div>
      ${valorHtml}
    </div>`;
  }).join("");
  return `<div class="tv-header">
      <div><div class="tv-title">Resumen general</div><div class="tv-title-main">Líder de cada equipo</div></div>
      <div class="tv-meta" id="mesMetaResumen"></div>
    </div>
    <div class="summary-grid">${cards}</div>`;
}
const TOP5_CATS = ["asesores","consultores","supervisores"];

/* Ranking tipo competencia: si hay empate, comparten el mismo lugar
   (ej. 1, 1, 3, 4, 4 — nunca salta a "2" si dos empatan en 1). */
function withRanks(rows, metricFn){
  let rank = 0, prevVal = null;
  return rows.map((r,i)=>{
    const val = metricFn(r);
    if(prevVal === null || val !== prevVal){ rank = i+1; }
    prevVal = val;
    return { row:r, rank, val };
  });
}

function renderTop5(key){
  const cfg = CATS[key];
  const rows = sortedRows(key);
  const ranked = withRanks(rows, cfg.metric);
  const top5 = ranked.filter(x => x.rank <= 5);

  if(top5.length === 0 || cfg.metric(top5[0].row) === 0){
    const msgs = { asesores:"0 ventas aún…", consultores:"Sin contratos aún", supervisores:"Sin puntos aún" };
    return `<div class="tv-header">
        <div><div class="tv-title">${cfg.label}</div><div class="tv-title-main">Top 5 del mes</div></div>
        <div class="tv-meta">${cfg.metricLabel}${cfg.formulaNote? " · "+cfg.formulaNote : ""}</div>
      </div>
      <div class="rest-list"><div class="rest-row empty-row"><div class="who">${msgs[key] || "Sin datos aún"}</div></div></div>`;
  }

  const medalFor = r => r===1?"🥇": r===2?"🥈": r===3?"🥉": null;
  let rowsHtml = top5.map(({row:r, rank, val})=>{
    const pct = Math.min(cfg.pct(r),1);
    const medal = medalFor(rank);
    const valorHtml = cfg.dual
      ? `<div class="dual-val">
           <div><span class="dual-num">${cfg.valA(r)}</span><span class="dual-lbl">${cfg.valALabel}</span></div>
           <div><span class="dual-num">${cfg.valB(r)}</span><span class="dual-lbl">${cfg.valBLabel}</span></div>
           ${cfg.valC ? `<div><span class="dual-num dual-num-puntos">${cfg.valC(r)}</span><span class="dual-lbl">${cfg.valCLabel}</span></div>` : ""}
         </div>`
      : `<div class="val">${cfg.isPct ? fmtPct(val) : Math.round(val)+""}</div>`;
    return `<div class="rest-row top5-row ${rank<=3?'top5-'+rank:''}">
      <div class="pos">${medal ? medal : rank+"."}</div>
      <div class="who">${r.nombre}<span class="tag">${cfg.sub(r)}</span>
        <div class="bar-mini"><div style="width:${(pct*100).toFixed(0)}%"></div></div>
      </div>
      ${valorHtml}
    </div>`;
  }).join("");

  return `<div class="tv-header">
      <div><div class="tv-title">${cfg.label}</div><div class="tv-title-main">Top 5 del mes</div></div>
      <div class="tv-meta">${cfg.metricLabel}${cfg.formulaNote? " · "+cfg.formulaNote : ""}</div>
    </div>
    <div class="rest-list">${rowsHtml}</div>`;
}

function renderCategoriaTV(key){
  const cfg = CATS[key];
  const rows = sortedRows(key);
  const podium = [rows[1], rows[0], rows[2]];
  const posClass = ["p2","p1","p3"];
  const posMedal = ["🥈","🥇","🥉"];

  let podiumHtml = podium.map((r,i)=>{
    if(!r) return `<div class="podium-card ${posClass[i]}"><div class="empty-slot">Sin datos aún</div></div>`;
    const val = cfg.isPct ? fmtPct(cfg.metric(r)) : Math.round(cfg.metric(r))+"";
    return `<div class="podium-card ${posClass[i]}">
      <div class="medal">${posMedal[i]}</div>
      <div class="podium-name">${r.nombre}</div>
      <div class="podium-sub">${cfg.sub(r)}</div>
      <div class="podium-value">${val}</div>
      <div class="podium-value-label">${cfg.valueLabel}</div>
    </div>`;
  }).join("");

  let restHtml = rows.slice(3,10).map((r,i)=>{
    const pct = Math.min(cfg.pct(r),1);
    const val = cfg.isPct ? fmtPct(cfg.metric(r)) : Math.round(cfg.metric(r))+"";
    return `<div class="rest-row">
      <div class="pos">${String(i+4).padStart(2,"0")}</div>
      <div class="who">${r.nombre}<span class="tag">${cfg.sub(r)}</span>
        <div class="bar-mini"><div style="width:${(pct*100).toFixed(0)}%"></div></div>
      </div>
      <div class="val">${val}</div>
    </div>`;
  }).join("");
  if(!restHtml) restHtml = `<div class="rest-row"><div class="who" style="color:var(--muted)">No hay más registros en esta categoría.</div></div>`;

  return `<div class="tv-header">
      <div><div class="tv-title">${cfg.label}</div><div class="tv-title-main">Ranking del mes</div></div>
      <div class="tv-meta">${cfg.metricLabel}${cfg.formulaNote? " · "+cfg.formulaNote : ""}</div>
    </div>
    <div class="podium">${podiumHtml}</div>
    <div class="rest-list">${restHtml}</div>`;
}

let rafId = null;
function startCycle(){
  clearInterval(cycleTimer);
  if(rafId) cancelAnimationFrame(rafId);
  const fill = document.getElementById("progressFill");
  let segmentStart = performance.now();

  function tick(now){
    const elapsed = now - segmentStart;
    const pct = Math.min(100, (elapsed/CYCLE_MS)*100);
    fill.style.width = pct + "%";
    if(elapsed >= CYCLE_MS){
      tvIndex = (tvIndex+1) % tvScreens().length;
      renderTV();
      segmentStart = now;
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

/* ============ TIEMPO REAL (push, sin polling) ============ */
if(dataRef){
  dataRef.on("value", (snapshot)=>{
    const val = snapshot.val();
    if(val){
      DATA = normalizarDatos(val);
      document.getElementById("mesLabel").textContent = mesActualLabel();
      setLive(true, "En vivo");
      renderTV();
      if(!rafId) startCycle();
    }else{
      document.getElementById("tvContent").innerHTML = `<div class="status-msg">Esperando datos del editor…</div>`;
      setLive(true, "Sin datos");
    }
  }, (err)=>{
    document.getElementById("tvContent").innerHTML = `<div class="status-msg err">Error al conectar: ${err.message}</div>`;
    setLive(false, "Error");
  });
}
</script>
