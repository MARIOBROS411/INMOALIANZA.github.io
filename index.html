<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcula tu cuota - Inmoalianza</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-oscuro: #005691;
            --azul-claro: #00AEEF;
            --gris-fondo: #f4f7f6;
            --blanco: #ffffff;
        }

        /* Reset para evitar desbordamientos */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--gris-fondo);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: var(--blanco);
            width: 100%;
            max-width: 900px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--azul-oscuro);
            padding-bottom: 10px;
        }

        .header h1 {
            color: var(--azul-oscuro);
            margin: 0;
            font-size: 20px;
            text-transform: uppercase;
        }

        .main-content {
            display: flex;
            flex-direction: row; /* Horizontal por defecto */
            flex-wrap: wrap;
            gap: 30px;
        }

        .controls {
            flex: 1.2;
            min-width: 280px;
        }

        .visuals {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .value-display {
            font-size: 20px;
            font-weight: bold;
            color: var(--azul-claro);
            margin-top: 5px;
        }

        .select-btns {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-year {
            flex: 1;
            padding: 12px 5px;
            border: 2px solid var(--azul-oscuro);
            background: none;
            color: var(--azul-oscuro);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        .btn-year.active {
            background-color: var(--azul-oscuro);
            color: white;
        }

        .result-box {
            background-color: var(--azul-oscuro);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }

        .result-box .amount {
            font-size: 30px;
            font-weight: bold;
            display: block;
        }

        .chart-container {
            position: relative;
            height: 230px;
            width: 230px;
        }

        .chart-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 13px;
            color: #666;
            pointer-events: none;
        }

        .info-text {
            font-size: 11px;
            color: #777;
            margin-top: 15px;
            line-height: 1.4;
            text-align: center;
        }

        /* --- ADAPTACIÓN A MÓVILES --- */
        @media (max-width: 650px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px 15px;
            }
            .header h1 {
                font-size: 18px;
            }
            .main-content {
                flex-direction: column; /* Apilar elementos verticalmente */
            }
            .controls, .visuals {
                min-width: 100%;
            }
            .chart-container {
                height: 200px;
                width: 200px;
            }
            .btn-year {
                font-size: 12px;
                padding: 10px 2px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Cuánto pagarías con Inmoalianza</h1>
    </div>

    <div class="main-content">
        <div class="controls">
            <div class="input-group">
                <label>Monto del Crédito</label>
                <input type="range" id="montoRange" min="20000" max="100000" step="10000" value="20000">
                <div class="value-display" id="montoText">$20,000</div>
            </div>

            <div class="input-group">
                <label>Plazo del Crédito</label>
                <div class="select-btns">
                    <button class="btn-year active" onclick="setYear(5)">5 Años</button>
                    <button class="btn-year" onclick="setYear(10)">10 Años</button>
                    <button class="btn-year" onclick="setYear(15)">15 Años</button>
                </div>
            </div>

            <div class="input-group">
                <label>Entrada mínima requerida (5.75%):</label>
                <div class="value-display" id="entradaText" style="color: #666;">$1,150.00</div>
            </div>

            <div class="result-box">
                <span>Tu cuota mensual estimada:</span>
                <span class="amount" id="cuotaMensual">$410.00</span>
            </div>
        </div>

        <div class="visuals">
            <div class="chart-container">
                <canvas id="loanChart"></canvas>
                <div class="chart-label">
                    <b>DEUDA<br>TOTAL</b>
                </div>
            </div>
            <p class="info-text">
                * Tasa de interés aplicada: <span id="tasaText">4.60%</span> anual.<br>
                Valores referenciales sujetos a aprobación crediticia.
            </p>
        </div>
    </div>
</div>

<script>
    let currentYear = 5;
    let montoActual = 20000;
    let myChart;

    const tablaData = {
        20000: { 5: 410.00, 10: 205.00, 15: 149.44, entrada: 1150 },
        30000: { 5: 615.00, 10: 307.50, 15: 224.17, entrada: 1725 },
        40000: { 5: 820.00, 10: 410.00, 15: 298.89, entrada: 2300 },
        50000: { 5: 1025.00, 10: 512.50, 15: 373.61, entrada: 2875 },
        60000: { 5: 1230.00, 10: 615.00, 15: 448.33, entrada: 3450 },
        70000: { 5: 1435.00, 10: 717.50, 15: 523.06, entrada: 4025 },
        80000: { 5: 1640.00, 10: 820.00, 15: 597.78, entrada: 4600 },
        90000: { 5: 1845.00, 10: 922.50, 15: 672.50, entrada: 5175 },
        100000: { 5: 2050.00, 10: 1025.00, 15: 747.22, entrada: 5750 }
    };

    function setYear(year) {
        currentYear = year;
        document.querySelectorAll('.btn-year').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.includes(year)) btn.classList.add('active');
        });
        updateCalculations();
    }

    document.getElementById('montoRange').addEventListener('input', function(e) {
        montoActual = parseInt(e.target.value);
        document.getElementById('montoText').innerText = `$${montoActual.toLocaleString()}`;
        updateCalculations();
    });

    function updateCalculations() {
        const data = tablaData[montoActual];
        const cuota = data[currentYear];
        const entrada = data.entrada;
        // Mantenemos la lógica de tasa de tu código original
        const tasa = currentYear === 5 ? "4.60%" : "2.30%";
        
        const totalPagado = cuota * currentYear * 12;
        const intereses = totalPagado - montoActual;

        document.getElementById('cuotaMensual').innerText = `$${cuota.toFixed(2)}`;
        document.getElementById('entradaText').innerText = `$${entrada.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('tasaText').innerText = tasa;

        updateChart(montoActual, intereses);
    }

    function updateChart(capital, intereses) {
        const ctx = document.getElementById('loanChart').getContext('2d');
        
        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Capital', 'Intereses'],
                datasets: [{
                    data: [capital, intereses],
                    backgroundColor: ['#005691', '#00AEEF'],
                    hoverOffset: 4,
                    borderWidth: 0
                }]
            },
            options: {
                cutout: '70%',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { 
                            boxWidth: 12,
                            font: { size: 11 }
                        }
                    }
                }
            }
        });
    }

    updateCalculations();
</script>

</body>
</html>
