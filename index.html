<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcula tu casa - Inmoalianza</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-oscuro: #005691;
            --azul-claro: #00AEEF;
            --gris-fondo: #f4f7f6;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--gris-fondo);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: var(--blanco);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--azul-oscuro);
            padding-bottom: 10px;
        }

        .header h1 {
            color: var(--azul-oscuro);
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }

        .controls {
            flex: 1;
            min-width: 300px;
        }

        .visuals {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
            color: #333;
        }

        /* Estilo del Slider */
        input[type="range"] {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--azul-oscuro);
            border-radius: 50%;
            cursor: pointer;
        }

        .value-display {
            font-size: 24px;
            font-weight: 700;
            color: var(--azul-claro);
            margin-top: 10px;
        }

        /* Estilo de Botones de Años */
        .select-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-year {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--azul-oscuro);
            background: white;
            color: var(--azul-oscuro);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-year.active {
            background-color: var(--azul-oscuro);
            color: white;
        }

        /* Cuadro de Resultado */
        .result-box {
            background-color: var(--azul-oscuro);
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-top: 30px;
        }

        .result-box span {
            display: block;
            font-size: 14px;
            opacity: 0.9;
        }

        .result-box .amount {
            font-size: 36px;
            font-weight: 900;
            margin-top: 5px;
            opacity: 1;
        }

        /* Gráfico */
        .chart-container {
            position: relative;
            height: 280px;
            width: 280px;
        }

        .chart-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 13px;
            color: #555;
            font-weight: bold;
            pointer-events: none;
        }

        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 20px;
            line-height: 1.5;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container { padding: 15px; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Cuánto pagarías con tu casa en Inmoalianza</h1>
    </div>

    <div class="main-content">
        <div class="controls">
            <div class="input-group">
                <label>Selecciona el Monto deseado</label>
                <input type="range" id="montoRange" min="20000" max="100000" step="10000" value="20000">
                <div class="value-display" id="montoText">$20,000</div>
            </div>

            <div class="input-group">
                <label>Plazo del Crédito (Años)</label>
                <div class="select-btns">
                    <button class="btn-year active" id="btn-5" onclick="setYear(5)">5 Años</button>
                    <button class="btn-year" id="btn-10" onclick="setYear(10)">10 Años</button>
                    <button class="btn-year" id="btn-15" onclick="setYear(15)">15 Años</button>
                </div>
            </div>

            <div class="input-group" style="margin-top: 20px; border-left: 4px solid var(--azul-claro); padding-left: 15px;">
                <label style="margin-bottom: 0; font-size: 14px; color: #666;">Entrada mínima requerida (5.75%):</label>
                <div id="entradaText" style="font-weight: bold; font-size: 18px;">$1,150.00</div>
            </div>

            <div class="result-box">
                <span>Tu cuota mensual aproximada:</span>
                <div class="amount" id="cuotaMensual">$410.00</div>
            </div>
        </div>

        <div class="visuals">
            <div class="chart-container">
                <canvas id="loanChart"></canvas>
                <div class="chart-label">
                    ESTRUCTURA DE<br>TU PAGO
                </div>
            </div>
            <p class="info-text">
                * Tasa de interés aplicada: <strong id="tasaText">4.60%</strong> anual.<br>
                Los valores incluyen capital e intereses. No incluyen seguros.
            </p>
        </div>
    </div>
</div>

<script>
    let currentYear = 5;
    let montoActual = 20000;
    let myChart;

    // Datos exactos de tu tabla
    const tablaData = {
        20000: { 5: 410.00, 10: 205.00, 15: 149.44, entrada: 1150 },
        30000: { 5: 615.00, 10: 307.50, 15: 224.17, entrada: 1725 },
        40000: { 5: 820.00, 10: 410.00, 15: 298.89, entrada: 2300 },
        50000: { 5: 1025.00, 10: 512.50, 15: 373.61, entrada: 2875 },
        60000: { 5: 1230.00, 10: 615.00, 15: 448.33, entrada: 3450 },
        70000: { 5: 1435.00, 10: 717.50, 15: 523.06, entrada: 4025 },
        80000: { 5: 1640.00, 10: 820.00, 15: 597.78, entrada: 4600 },
        90000: { 5: 1845.00, 10: 922.50, 15: 672.50, entrada: 5175 },
        100000: { 5: 2050.00, 10: 1025.00, 15: 747.22, entrada: 5750 }
    };

    function setYear(year) {
        currentYear = year;
        
        // CORRECCIÓN: Manejo preciso de clases activas por ID para evitar conflictos
        document.querySelectorAll('.btn-year').forEach(btn => {
            btn.classList.remove('active');
        });
        document.getElementById('btn-' + year).classList.add('active');
        
        updateCalculations();
    }

    document.getElementById('montoRange').addEventListener('input', function(e) {
        montoActual = parseInt(e.target.value);
        document.getElementById('montoText').innerText = `$${montoActual.toLocaleString()}`;
        updateCalculations();
    });

    function updateCalculations() {
        const data = tablaData[montoActual];
        const cuota = data[currentYear];
        const entrada = data.entrada;
        
        // Tasas solicitadas
        const tasa = currentYear === 5 ? "4.60%" : "2.30%";
        
        const totalPagado = cuota * currentYear * 12;
        const intereses = totalPagado - montoActual;

        // Actualizar Elementos Visuales
        document.getElementById('cuotaMensual').innerText = `$${cuota.toFixed(2)}`;
        document.getElementById('entradaText').innerText = `$${entrada.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('tasaText').innerText = tasa;

        updateChart(montoActual, intereses);
    }

    function updateChart(capital, intereses) {
        const ctx = document.getElementById('loanChart').getContext('2d');
        
        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Capital (Monto solicitado)', 'Intereses totales'],
                datasets: [{
                    data: [capital, intereses],
                    backgroundColor: ['#005691', '#00AEEF'],
                    borderColor: '#ffffff',
                    borderWidth: 2,
                    hoverOffset: 10
                }]
            },
            options: {
                cutout: '75%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { 
                            boxWidth: 15,
                            padding: 20,
                            font: { size: 12 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                if (label) label += ': ';
                                label += '$' + Math.round(context.raw).toLocaleString();
                                return label;
                            }
                        }
                    }
                },
                maintainAspectRatio: false
            }
        });
    }

    // Ejecución inicial al cargar la página
    window.onload = updateCalculations;
</script>

</body>
</html>
